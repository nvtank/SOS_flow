services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sosflow
      POSTGRES_PASSWORD: sosflow
      POSTGRES_DB: sosflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sosflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://sosflow:sosflow@postgres:5432/sosflow
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      PRIORITY_RULES_PATH: /config/priority-rules.yaml
      SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
